{% extends 'base.html' %}
{% block title %}Admin Login · Medislot{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="card login-card">
    <p class="hero-eyebrow">Staff Access</p>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-sub">Sign in to view and manage the appointments table.</p>

    <form method="POST" class="login-form">
      <label class="field">
        <span>Username</span>
        <input type="text" name="username" placeholder="UserId" required autofocus>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>

    <p class="login-hint"></p>
  </div>
</div>
{% endblock %}
